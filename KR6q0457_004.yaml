body:
  text: 侍者海澄記録頌古趙州示衆云兄弟若從南方來者即與下載若從北方來者即與裝載所以道近上人問道即失道近下人問道即得道兄弟正人說邪法邪法亦隨正邪人說正法正法亦隨邪諸方難見易識我者裏易見難識老禪將韜略長瓜分南北細品雌黃下載與裝載利鈍展鋒芒三世諸佛不識詎容取次承當蟾彰千澗高低月春轉寰中遠近香東坡居士參東林總禪師總與論無情話有省遂獻投機偈云溪聲便是廣長舌山色無非清淨身夜來八萬四千偈他日如何舉似人後圓智證悟法師參護國此菴元禪師法師舉東坡宿東林偈且曰也不易到此田地菴曰尚未見路徑何言到耶曰祇如他道溪聲便是廣長舌山色豈非清淨身若不到此田地如何有者箇消息菴曰是門外漢耳曰和尚不吝可為說破菴曰卻從者裏猛著精彩覷捕看若覷捕得他破則亦知本命元辰落著處師通夕不寐及曉鐘鳴去其祕蓄以前偈別曰東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人劫外今時無彼此從來換步不移身咄哉彼此何偏頗一向瀟湘一向秦爭似兩頭坐斷何妨撥轉乾坤華山分破無多子獨拔無門解脫門古隄和尚尋常見僧來每云去汝無佛性僧無對或有對者莫契其旨一日仰山到參師云汝無佛性山叉手近前應諾師笑曰子甚處得此三昧仰曰我從溈山得復問和尚從誰得師曰我從章敬得幾箇師僧無佛性妙藥難救膏肓病叉手近前能識宗自然上恭而下敬彼此三昧有師承主賓互換全正令一對鴛鴦戲水湄啾啾籬雀難同泳日子和尚因亞溪來參師作起勢溪曰者老山鬼猶見某甲在師曰罪過罪過適來失祇對溪欲進語師叱之溪曰大陳當前不妨難禦師曰是是溪曰不是不是趙州云可憐兩箇漢不會轉身句寒山語拾得笑有參差沒孔竅無腔韻出高低調轉身不會可憐生明明一句三玄要香嚴上堂若論此事如人上樹口銜對枝腳不踏枝手不攀枝對下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出衆云對上即不問未上對時請和尚道師乃呵呵大笑未舉已前先薦得從教節外又生枝咬人師子全生殺忍俊韓盧沒了期未上對也大奇呵呵一笑少人知長生皎然禪師常訪一菴主款話菴主曰近有一僧問某甲西來意遂舉拂子示之不知還得也無師曰爭敢道得與不得師卻問有人問菴主此事有人保任如虎頭帶角有人嫌棄則不直半文錢此事為什麼毀譽不同請試揀出看曰適來出自偶然爭揀得出師曰若恁麼此後不得為人胡來胡現是賊識賊舌頭無骨利如鋒爛泥有刺人難測人難測落霞與孤鶩齊飛秋水共長天一色龍峻和尚因僧問如何是不知善惡底人師曰千聖近不得曰此人還知有向上事也無師曰不知曰為什麼不知師曰不識善惡說什麼向上事曰如何師曰不見道犴俗不識善惡灑灑落落向上亦不知千聖難湊泊毫氂繫念不平常未免畫地為牢無繩而自縛睡龍和尚因僧問如何是觸目菩提師以杖趁之僧乃走師曰住住向後莫錯舉似人畣在問處更不周遮重重相為舉向作家落花有意隨流水流水無心戀落花地藏和尚問僧什麼處來曰秦州來師曰將得什麼物來曰不將得物來師曰汝為什麼對衆謾語其僧無對來問若成風應機非善巧三搭不回頭笑破衲僧口饑逢王膳不能食百城煙水何時了僧問雲居膺禪師羚羊挂角時如何師曰六六三十六復曰會麼曰不會師曰不見道無蹤跡羚羊挂角迥絶羅籠通身無影像遍界絶行蹤雖無牙爪甚威獰獵犬難尋誰敢觸剛觸著轉轆轆六六依然三十六鼓山智嶽禪師因僧問虛空還解作用也無師拈起拄杖云箇師僧好打針芥相投運斤成風奔流度刃不見痕蹤龍袖拂開山嶽震虛空迸出電光紅大顛初參石頭頭問那箇是汝心師曰見言語者是頭便喝出經旬日師卻問前者既不是除此外何者是心頭曰除卻揚眉瞬目將心來師曰無心可將來頭曰原來有心何言無心無心盡同謗師於言下大悟言語相呈渾不是揚眉瞬目亦須蠲水盡山窮難進步驀然一指路通天路通天絶正偏虛空背上駕鐵船香嚴上堂僧問不求諸聖不重己靈時如何嚴曰萬機休罷千聖不攜疏山禪師在衆作歐聲曰是何言歟嚴聞便下座曰適對此僧必有不是致招師叔如是未審過在甚麼處師曰萬機休罷猶有物在千聖不攜亦從人得如何無過嚴曰卻請師叔道師曰若教某甲道須還師資禮始得嚴乃禮拜躡前問師曰何不道肯諾不得全嚴曰肯又肯箇甚麼諾又諾於阿誰師曰肯即肯他千聖諾即諾於己靈嚴曰師叔恁麼道向去倒屙三十年在師後問鏡清肯諾不得全子作麼生會清曰全歸肯諾師曰不得全又作麼生清曰箇中無肯路師曰始愜病僧意己靈諸聖海中漚休罷不攜臘月扇拳踢相應機副機胡來漢現箭中箭龍象蹴踏跛驢難見肯諾不得全清風生八面快須著眼看仙人莫看仙人手中扇洞山因僧問三身之中阿那身不墮衆數山曰吾嘗於此切後有問曹山先師道吾嘗於此切意作麼生曹山云要頭即斫將去又問雪峰雪峰以拄杖趁云我亦曾到洞山來吾嘗此切不墮衆數夜半正明天曉不露要頭斫去隱寒芒滿口含霜何用訴打趁曾到洞山來電光影裏分緇素阿呵呵悟不悟三箇老古錐同行不同步曹山因僧問常在生死海中沈沒者是什麼人師曰第二月曰還求出離也無師曰也求出離只是無路曰出離什麼人接得伊師曰擔鐵枷者生死海第二月迷真認影何時歇不用別處求出離當下翻身自超越頓超越得自繇更嫌何處不風流曹山因僧問魯祖面壁意旨如何山掩耳動絃別曲葉落知秋若非作者孰辨端繇有意氣時添意氣不風流處轉風流雪峰因僧問古人道覿面相呈時如何師曰是曰如何是覿面相呈師曰蒼天蒼天覿面相呈是也無端含元殿裏誰覓長安可憐不遇知音者空把瑤琴對面彈僧問乾峰十方婆伽梵一路涅槃門未審路頭在甚麼處峰以拄杖劃云在者裏雲門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼乾峰拄杖雲門扇掣電光中看轉變堂堂對面眼麻眯涅槃有路無人薦有人薦鯉魚𨁝跳雨盆傾流出桃華千萬片僧問報慈藏嶼禪師情生智隔想變體殊祇如情未生時如何師云隔云情未生時隔箇甚麼師曰者箇梢郎子未遇人在情未生時直言隔悠悠寒角發孤城一種是聲無限意有堪聽有不堪聽興化因後唐莊宗幸河北回魏府行宮詔師問曰朕取中原獲得一寶未曾有人酬價師曰請陛下寶看帝以兩手舒襆頭腳師曰君王之寶誰敢酬價玄覺徵云且道興化肯莊宗不肯莊宗若肯莊宗興化眼在甚麼處若不肯莊宗過在甚麼處兩手擎來問法王中原一寶不囊藏知音自是能明鑑直得光輝滿大唐僧問雲門如何是清淨法身門云華藥欄曰便恁麼去時如何門云金毛師子清淨法身華藥欄一句全提絶潦倒便與麼休草草金毛師子旋風掃三千里外見淆訛幾箇衲僧有眼腦僧問曹山如何是師子山曰衆獸近不得如何是師子兒山曰能吞父母者曰既是衆獸近不得因甚卻被兒吞山曰子若哮吼祖父母俱喪曰只如祖父母還盡也無山曰亦盡曰盡後如何山曰全身歸父曰前來為甚麼道祖父亦盡山曰不見道王子能成一國之事枯木上更撒些子華衆獸近不得因甚被兒吞為伊能哮吼纖毫影不存全身既歸父大用體全真苔生玉殿巍然貴枯木華開遍界春智門欽禪師因僧問兩鏡相對為什麼中間無相師曰自己亦須隱曰鏡破臺亡時如何師豎起拳兩鏡相對元無相百億須彌不見蹤鏡破臺亡全體現鐵船高駕太虛空廣德周禪師因僧問承教有言阿逸多不斷煩惱不修禪定佛記此人成佛無疑此理如何師曰鹽又盡炭又無曰鹽盡炭無時如何師曰愁人莫向愁人說說向愁人愁殺人不求真不斷妄了無欣猒真過量蕩盡家私徹骨窮風流瀟灑襟懷曠相逢果有知音知面面好風來席上黃龍機禪師因僧問不問祖佛邊事如何是平常之事師曰我住山得十五年也來問平常事山居十五年鎮日閒閒地常時坦坦然鳥啼修竹裏華笑碧崖前盡情俱吐露莫作俗流傳玄泉第二世和尚因僧問辭窮理盡時如何師曰不入理豈同盡萬里無雲天喫棒須知別有好家風靈文海藏詮不及今昔貫穿絶始終一片風光描不就至尊至貴許誰同龍穴山和尚因僧問大善知識為甚麼卻與土地燒錢師云彼上人者難為酬對土地燒錢冷處著把問有來繇畣無虛假彼難酬對曲高和寡言中有響瀟瀟灑灑瀟灑絶碧眼胡僧難辨別韶國師有時謂衆曰大凡言句應須絶滲漏始得時有僧問如何是絶滲漏底句師曰汝口似鼻孔口如鼻孔眼如眉石女能吟白雪詩昨夜虛空開口笑木人生得石竿兒韶國師因僧問櫓棹俱停如何得到彼岸師曰慶汝平生彼岸何曾離當處若諳停棹便通玄衲僧薦得風前旨直截分明妙莫傳報慈文遂禪師問僧從什麼處來曰撫州曹山來師曰幾程到此曰七程師曰行卻許多山林溪澗何者是汝自己曰總是師曰衆生顛倒認物為己曰如何是學人自己師曰總是大地山河俱是寶不識之人入荒草依稀倣佛眼未開拈卻鼻孔無處討殺人劍活人刀起死回生手段高雲居清錫禪師因僧問古人有言釋迦與我同參未審參何人師曰唯有同參方得知曰未審此人如何親近師曰恁麼則不解參也與佛同參誰辨的元無彼此絶疏親琉璃古殿浸明月端拱何曾有二人擬親近隔關津錯過威音劫外春永明壽禪師因僧問如何是永明妙旨師曰更添香著曰謝師指示師曰且喜沒交涉仍有偈曰欲識永明旨門前一湖水日照光明生風吹波浪起欲識祖師玄妙旨添香撥火誰能委一湖吞盡大千界萬象光含無表裏迷頭認影不相當對面白雲千萬里南泉山下有一菴主人謂曰近日南泉和尚出世何不去禮見主曰非但南泉出世直饒千佛出興我亦不去師聞乃令趙州去勘州去便設拜主不顧州從東過西又從西過東主亦不顧州曰草賊大敗遂拽下簾子便歸舉似師曰我從來疑著者漢次日與沙彌攜茶一瓶盞三隻到菴擲向地上乃曰昨日底昨日底主曰昨日底是甚麼師於沙彌背上拍一下曰賺我來賺我來拂袖便回好箇擔板漢橫身一條鐵智勇李將軍兩度拗不折出師重決龍蛇陳當鋒連下頂門楔馬陵道下死龐涓千古英雄常淚血百丈惟政禪師有老宿見日影透窗問師為復窗就日日就窗師曰長老房中有客歸去好問來隱密畣不囊藏運籌帷幄捉賊擒王驀喚一聲歸去好和雲帶露溼秋光酈村自滿禪師上堂古今不異法爾如然更復何也雖然如此者箇事大有人罔措在僧問不落古今請師直道師曰情知爾罔措僧欲進語師曰將謂老僧落伊古今曰如何即是師曰魚騰碧漢階級難飛曰如何免得此過師曰若是龍形誰論高下僧禮拜師曰苦哉屈哉誰人似我迥絶威音與目前古今不落本天然擬求直道翻成曲蚤隔程途萬八千欲免過轉堪憐天上人間誰似我驅雷掣電鼓風煙南源道明禪師上堂快馬一鞭至人一言有事何不出頭來無事各自珍重僧問一言作麼生師乃吐舌云待我有廣長舌相即向汝道一言吐出最親切舌相圓音徹大千不是仙陀難湊泊抬眸鷂子過西天西堂智藏禪師普請次曰因果歷然爭奈何爭奈何時有僧出以手托地師曰作甚麼曰相救相救師曰大衆者箇師僧猶較些子僧拂袖便走師曰獅子身中蟲自食獅子肉無風浪起有事有理隨機應變搖頭擺尾電影才收腦後星流一抬一搦善錐鉤收虎尾兮踞虎頭華林善覺禪師因觀察使裴休相訪問曰還有侍者否師曰有一兩箇祇是不可見客裴曰在甚麼處師乃喚大空小空時二虎自菴後而出裴睹之驚悸師語二虎曰有客且去二虎哮吼而去裴問曰師作何行業感得如斯師乃良久曰會麼曰不會師曰山僧常念觀音本色住山人無心自合道天人龍虎悉皈依水到渠成非作造問何行業感如斯山僧常念觀音號古寺和尚丹霞來參經宿明旦粥熟行者祇盛一鉢與師又盛一碗自喫殊不顧丹霞亦自盛粥喫者曰五更侵蚤起更有夜行人霞問師何不教訓行者得恁麼無禮師曰淨地上不可更點污人家男女霞曰幾不問過者老漢家富小兒嬌強兵無弱將泥牛吼月浪千尋石筍抽條長萬丈黑澗和尚因僧問如何是密室師曰截耳臥街如何是密室中人師乃換手捶胸密室虛通絶正偏毫無造作始天然風前不薦室中主更要將軍贈玉鞭能善委直如絃買得風流不用錢鹽官安國師有法空禪師到請問經中諸義師一一畣了卻曰自禪師來貧道總未作得主人曰便請和尚作主人師曰今日夜也且歸本位安置明日卻來法空下去至明旦師令沙彌屈法空禪師法空至師顧沙彌曰咄者沙彌不了事教屈法空禪師屈得箇守堂家人法空無語酬醋殷勤全道義和光應物探來賓洪鈞律轉華千對客情猶自不知春旁敲正打喪卻全身一聲黃鳥青山外占斷風光作主人乳源和尚仰山作沙彌時念經聲高師咄曰者沙彌念經恰似哭曰慧寂祇恁麼未審和尚如何師乃顧視仰曰若恁麼與哭何異師乃休箭鋒拄劍刃交移星轉斗換象抽爻回首暮雲歸未合抬眸新月上林梢黃檗在南泉普請擇菜次泉問甚處去曰擇菜去曰將甚麼擇師提起刀泉曰祇解作賓不解作主師以刀點三下泉曰大家擇菜去泉一日曰老僧有牧牛歌請長老和師曰某甲自有師在師辭南泉泉門送提師笠曰長老身材沒量大笠子太小生師曰雖然如此大千世界總在裏許泉曰王老師聻師戴笠便行賓主歷然活潑潑吹毛用處乾坤黑無腔雪曲扣知音妙展家風人莫測縱奪同時善抑揚大千總在箇中藏龍蛇陳上多機變海內橫行越大方黃檗示衆云汝等諸人盡是噇酒糟漢恁麼行腳何處有今日還知大唐國裏無禪師麼時有僧出云只如諸方匡徒領衆又作麼生師云不道無禪祇是無師超師作啓後昆噇酒糟漢蟻聚蠅奔定龍蛇兮眼何正彰大用兮師不存陳雲橫海上拔劍攪龍門下視佛祖為兒孫蕩蕩巍巍顯獨尊長慶大安禪師初造百丈禮而問曰學人欲求識佛何者即是丈曰大似騎牛覓牛師曰識得後如何丈曰如人騎牛到家師曰未審始終如何保任丈曰如牧牛人執杖視之不令犯人苗稼師自茲領旨更不馳求為人直截沒周遮舉足分明便到家果爾時中能管帶何妨高駕白牛車不動步越流沙枯木龍吟消息盡風前鐵樹自開華臨濟大師住鎮州臨濟一晚小參曰有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪克符問如何是奪人不奪境師曰煦日發生鋪地錦嬰兒垂髮白如絲符曰如何是奪境不奪人師曰王令已行天下遍將軍塞外絶煙塵符曰如何是人境俱奪師曰并汾絶信獨處一方符曰如何是人境俱不奪師曰王登寶殿野老謳歌符於言下領旨暖風浩浩烘天地是處江山錦繡新皺碧蹙紅無限意醉眠公子不知春等閒一吸滄溟竭無限波瀾徹底乾擊碎珊瑚枝上月不留光影與人看正令全提無縫罅聖凡誰敢犯當頭有情有理俱三段一劍霜寒萬國愁天普盍兮地普擎運行日月鎮常明一人端拱無私化萬國歌謠享太平臨濟曰大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會下座一句全提玄要旨綱宗通攝了無遺吹毛用處天魔喪毒鼓轟時佛祖馳彩畫虛空無向背玲瓏八面有風規高提祖印誰能委獨許超方作者知僧問如何是真佛真法真道乞師開示師曰佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空名而無實有如真正道人念念不間斷自達磨大師從西土來祇是覓箇不受惑底人後遇二祖一言便了始知從前虛用工夫山僧今日見處與祖佛不別若第一句中薦得堪與佛祖為師若第二句中薦得堪與人天為師若第三句中薦得自救不了僧便問如何是第一句師曰三要印開朱點窄未容擬議主賓分曰如何是第二句師曰妙解豈容無著問漚和爭負截流機曰如何是第三句師曰但看棚頭弄傀儡抽牽全藉裏頭人至鑑本來無一物才分朕兆有三才玄爐大冶烹群象捏聚依前又放開師謂僧曰有時一喝如金剛王寶劍有時一喝如踞地師子有時一喝如探竿影草有時一喝不作一喝用汝作麼生會僧擬議師便喝迅雷一擊電光馳地軸天關悉轉移顛倒陰陽歸掌握黃頭碧眼莫能窺師一日示衆云參學人大須仔細如賓主相見便有言說往來或應物現形或全體作用或把機權喜怒或現半身或乘師子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上做模做樣學人又喝前人不肯放此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物隨學人問處即奪學人被奪扺死不放此是主看賓或有學人應一箇清淨境界出善知識前善知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎖出善知識前善知識更與安一重枷鎖學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正兩鋒開合展槍旗互換全機作者知一點不來雲萬里絲毫才失路千岐吉凶爻象須抽換生死關頭貴轉移橫按莫邪全正令寰中端坐鎮雄基示衆我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時驅耕夫之牛奪饑人之食敲骨取髓痛下針錐照用不同時有問有畣立主立賓合水和泥應機接物若是過量人向未舉已前撩起便行猶較些子古鏡當臺絶去留胡來漢現足機籌指南一出狼煙盡霹靂才收電火流把住衆流俱截斷放行攜手御階遊回途得妙無多子一月光含八百州上堂次兩堂首座相見同時下喝僧問師還有賓主也無師曰賓主歷然師召衆曰要會臨濟賓主句問取堂中二首座兩堂同喝針鋒相對賓主歷然是何三昧二水中分白鷺洲三山半落青天外一語歸宗萬國朝虛空合掌森羅拜
