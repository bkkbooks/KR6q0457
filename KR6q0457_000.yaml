front:
  text: 靈峰達變禪師語録敘大道雖曰現成然非苦心精研者莫克證入至理繇來平坦然非鐵骨負荷者未易傳持是以少室安心必待立雪斷臂之子而黃梅大衆惟腰石負舂者入室稟受為六傳冢嫡後世以輕慢心妄窺籓籬幾何不抉滅門戶使吾宗掃地哉先德知其然驗以牢固重關示以嶮崖千仞投以大火聚攝以鐵壁銀山受此任者不啻千二百斤擔子又如挂鎧出門與萬人敵凡以平坦成現之道不如是不足以盡其閫奧而窮其首尾當吾世而得一勤苦進道慎重法命之人是真叢林之僧寶法社之金城也吾于靈峰達變禪師深有感焉師少侍先天童椎拂即稱英衲後乃得法于山翁老人老人常稱學衆中參究精鋭無逾師者于師承邊溫研積稔昕夕摩厲或拈頌機緣一言未契至忘寢食必求得當而後已同學扣擊寸長不遺參徒請益雖祁寒溽暑不倦也盍其嚴毅服物類秀鐵面脫落形骸類廣無心草衣菲食清苦鍊行類象骨頭陀典司衆務罔懈參承類石霜監寺故即其升堂提唱悉皆嶄截提持雄深峭拔垂手為人處不失作家體裁佛祖血脈及盡玄微衲子爪牙通身透露洵傑出英靈純鋼鑄就者耶是以老人當師入室而有門人益親之喜及師順世而盡然傷懷謂天喪豫今復收拾遺録為師點出末後光明豈惟師一生苦心賴以不墜殆亦憫斯道之荒落示後流之標榜老人鼓舞來學之意極深厚矣嗟乎報緣影事修短一期雖法鼓晨裂流星夜隕而衲僧門下一言半句胸襟流出匝地普天是録既行世必有環中契旨言外知歸者師其不亡矣夫同門法弟鹿城冰菴張立廉拜題
