body:
  text: 侍者海澄記録垂問人人有箇影子寸步不離即不問目瞳無影時如何冤有頭債有主為甚麼桑樹上著箭穀樹上汁出種麻得麻種豆得豆因甚有善因而招惡果犀因玩月文生角象被雷驚華入牙即且置文彩未彰己前道將一句來如如向上沒可安排為甚麼建法幢立宗旨是法平等無有高下趙州為甚麼三等接人箭鋒相拄即不問袖裏藏鋒一句作麼生道風不來對不動為甚麼絶頂無根草無風自動搖傾湫倒嶽即不問不涉泥水道將一句來連朝下雨天人見水是琉璃魚龍見水是窟宅凡夫見水是水餓鬼見水是火衲僧家見作麼生汝若進一步即迷其理若退一步又失其事若也寂然地又是死漢作麼生免得此過應病與藥即不問去卻藥忌道將一句來若也廣尋文義猶如鏡裏求形更乃息念觀空喻似日中逃影不涉二途作麼生道汾陽道識得拄杖子一生參學事畢泐潭云識得拄杖子入地獄如箭射一等是拄杖子為甚麼有得有失前三三後三三即不問光前絶後一句作麼生道不可毀不可贊體若虛空無畔岸即不問通褒貶一句作麼生道點魚上竹竿一日一千里即不問不涉程途一句作麼生道少林一脈祖祖相傳因甚道大唐國裏無禪師有佛處不得住無佛處急走過畢竟向那裏安身立命佛身充滿於法界為甚麼佛法不到北俱盧州大坐當軒即不問如何是不露鋒骨底句向上一路千聖不傳達磨西來所為何事高高峰頂立不解從空放下深深海底行不能步步登高祇如二邊不住中道不居底畢竟如何話會始從鹿野苑終至跋提河於是二中間未嘗說一字大藏小藏甚處得來道無心合人人無心合道為甚麼無心猶隔一重關一人有慶兆民咸賴為甚麼庭前生瑞草好事不如無古人云施主一粒米大如須彌山若還不了道披毛帶角還祇如頭上角不全身上毛不出且道是何果報石長無根對山含不動雲因甚又道青山與白雲從來不相到有水皆涵月無山不帶雲夜月舒光為甚麼碧潭無景問畣機緣問僧甚處來云國清來師云既是國清為甚麼狼煙遍界匝地刀鎗僧擬議師云上座正鬧在問孟冬薄寒寒作何色師云且歸暖室商量問佛與衆生等無差別為甚衆生受佛戒即入諸佛位師云從前汗馬無人識祇要重論盍代功雜碎袈裟佛佛授手威音那畔阿誰傳持師云錫挂妙高新日月衣披亙古舊雲煙那伽常在定無有不定時為甚因戒生定師云為憐三歲子不惜兩莖眉三白羯磨是戒耶和尚阿闍黎乃至袈裟等是戒耶既都不是畢竟以何為戒師云是事如是持僧參師問打破虛空底人向甚麼處藏身云一毫頭上定乾坤師云一毫吞卻山河大地則易山河大地吞卻一毫則難你作麼生會僧無語師云大好一毫頭上定乾坤問僧情存聖量猶落法塵己見未忘還同滲漏了事衲僧如何受用僧云出頭天外看誰是我般人師云念言語漢未在更道僧無語師便打又僧云隨處得安閒師云亂統作麼僧無語師打云蝦蟆禪又一僧云莫把是非來辨我師云者是長連床上學得底畢竟如何受用僧無語師直打出問瑩侍者日月傍照三天下正照四天下即不問日月威光照不到處道將一句來云夜半正明天曉不露師云不是不是更道看者無語師云氣急殺人問僧甚處來云紹興來師云父母未生前從甚處來云遍界不曾藏師云者是古人底如何是你自己底僧無語師便打問如何是佛師云禮三拜向你道如何是法師云流通今古如何是僧師云眼橫鼻直僧禮拜師卻問如何是佛僧無語師指露柱云你且向者裏參去問澄侍者從來水火不同器因甚水裏火發澄云別是一家風瑩侍者云大用現前一僧云山上有鯉魚海底有蓬塵師云者是國一禪師底與你沒交涉僧無語師喝出問瑩侍者蟄戶不開龍無龍句知你會不得祇如枯木裏龍吟且道是何章句者云悉唎悉唎蘇嚕蘇嚕師云依稀相似倣佛不同問百尺竿頭即不問縣崖撒手事如何師云分身萬象中問僧不是心不是佛不是物是箇甚麼僧云某甲不明師云不明處明取云如何是不明處師云黑似漆明如日云畢竟如何是不明處師云山門頭合掌佛殿裏燒香問德雲從來不下妙高峰善財去參因甚卻在別峰相見師云大人境界普賢知問僧甚處來云湖州來師云湖州有箇端師子即今在甚麼處云湘之南潭之北師云者是耽源底與端師子有甚交涉僧無語師云弄虛頭漢問僧生路上死人無數熟路上不著活漢你作麼生會云某甲到者裏弓折箭盡求和尚指示師便打僧問枯木嵒前錯路多如何得不錯路師云看腳下隨問僧枯木嵒前是何意旨僧無語師云寢也未寢見說甚枯木嵒前僧臨行問兩腳梢空時如何師云走殺闍黎緊帩草鞋時如何師云絆殺有分僧云朝生便是鳳凰兒師云老鸛未許你在僧參師問從甚處發足云南嶽師云你道思大師鼻孔長多少云與和尚一般師云你道我鼻孔長多少僧擬議師便打僧參師問一向在那裏住云福建鼓山師云曾見晏國師否云不曾見師云你不曾在鼓山住僧問正睡著無寢無想無見無聞主人公拄甚麼處師云我且問你日間浩浩地主人公在甚麼處僧拍桌一下師云此是風力所轉終歸敗壞云瓮中不走鱉師云瓮中不走鱉火裏卻生煙偈送禪人行腳春光入幕時相識轉盼秋聲又將息草鞋緊峭別峰頭去去叢林須辨的未有常住而不行抹過須彌一坦平未有長行而不住堂堂坐斷千差路行即住住即行竿頭百尺路縱橫住即行行即住廓周沙界何來去從前大道沒遮攔究竟不曾離一步和石頭回禪師草菴歌草菴軒豁堪棲止虎護階前清飆起風月等閒恣吐吞重重圍繞好山水住山活計問如何日用頭頭無不是古路平世界陡無心合道道方偶一言曾脫野狐身鞭草血流頑石吼劍樹牙血盆口驅耕籍盡饑夫有栗棘蓬咬百雜碎喝下須彌山倒走虛空煥若金光聚耀古騰今人不喻大千函盍在其中七曜依之而順度謾嗟法滅天人憂祇為吾儕識浪遊寶藏自家渾不顧癡狂偏愛鏡中頭無住著任喧幽事事全彰法法收三萬猊臺方丈著百千獅子一毛頭天然古朴家風妙豈羡浮華碧玉甌石頭唱我和酬同風未敢必師儔吾愛吾廬雅自玉棲真彈指足千秋靈峰山歌古靈峰無內外劫火光中常自在巍然迥出最孤高八面玲瓏非向背難描邈超意況未諳入處徒渴仰雲裏旃檀香已久風前鐵對華初放桂輪輝珠露落白銀世界何寥廓夜明簾外任橫身鳥道玄途頻下腳峰巒秀溪壑寬水出高原受用便列派分宗能普潤澄潭不許老龍眠過量人弘此道鐵壁銀山都靠倒更將大地作紅爐祖佛聖凡齊鑄造不繇他全在己法法收歸掌握裏未來出格好風光總在如今一念始絶覆藏難隱諱充塞乾坤無不是毫氂差處隔天淵何曾踏著者些子須透徹始知音箇事休於紙上尋從來妙語非干舌本有天機海樣深迷即失悟即得掣電光中分白黑迅雷粉碎太虛空玉人夢破生平惑圜通少偏見多遂成雪曲與巴歌師絃一奏群音絶休問如何與若何拄杖歌扶傾伴月一拄杖赤體條條寧較樣風埃不著自神奇傲雪欺霜有骨壯最圜明何假漆傑出叢林作標格縱奪事事渾無礙為人不費絲毫力任橫拈憑倒卓耗動三有齊震愕疾如金翅攫獰龍遼空劈海何須摸顯全提彰大用覿面提持非戲弄鞭起鐵牛離死水解針枯骨知吟痛無背面沒心情豈屬陰陽造化生敲磕虛空饒有響橫撾塗毒鼓無聲攜佛祖撐乾坤獨拔無門解脫門長於上古而不老後天地極而長存示禪人至道難明要究明悟來方始出常情獅絃乍奏群音絶金翅才飛衆鳥驚剔起兩眉須自薦聊通一線要君醒男兒好具超方眼莫似時流造次行除夕道人胸次冷如冰話到年窮似未曾懶補衲衣雲片片從他垢面髮鬙鬙通紅不息地爐火獨耀無私古殿燈明日斬新條令句敲空作響韻鼟鼟和靈澄禪師山居詩因僧問我西來意我話山居不計年樂道人宜窮徹骨畏寒我且髮披肩斫將石罅龍須竹筧到廚中象眼泉清冷家風誰會得一鉤新月挂簾前因僧問我西來意我話山居不計年貝葉謾遮緇素眼袈裟難搭利名肩盡驚慈化神移樹若慕真風虎送泉自笑生平無伎倆鋤雲幾度薜蘿前賦得參差竹影上東窗月上東廓夜未央紙窗筠影拂寒光初疑水墨良工妙漸聽蕭疏風韻長快我案前清眼目奇君格外露行藏終宵坐對何靈活密室機先代舉揚和越五陳居士韻迥出靈嵒結石棚昔人於此悟無生談禪月殿龍投座散步雲梯虎伴行華雨室空難點綴機圜見徹任縱橫謾言衣鉢無分付千古高標啓後英壽本師天童和尚五秩巖桂香飄古道場法王初度先重陽望隆海內家風闊德被寰中化日長戶外天人爭踴躍座前衲子競鏗鏘虛空壽量憑何祝喜聽雷音遍十方送友住剡溪幾回清夜話松窗別思悠悠竟莫降片月那堪留去景好山自是動眉雙一毛吹起明宗旨寸草拈來建法幢他日儻能期我社不辭迢遞剪寒江擬梅送友住大梅寺瘦景離奇異衆芳南枝再發更殊常冷涵玉愛華初綻露滴酥懷味奈嘗將領紅英歸上苑不兼粉蝶逐霓裳生機豈藉東風力占斷春光轉少陽大梅簸箕擊碎虛空藏放出渾身白玉毫唱拍獨聯雲外調親疏一劄笑中刀鼯聞密室玄機寂虎建方墳道韻高莫謂師歸無處覓大梅山月浸松濤龍山高步不從雲水入青山未住已先來三間容納虛空小六戶通明晝夜開賓主謾分簾外月是非徒折鏡中梅茅菴燒卻名難掩振古洪音響似雷亮公虛空講得尚淆訛再喚回頭不較多驀地打翻關捩子全身跳出葛藤窠才離幽谷遷喬木便賣松風入翠蘿千古西山名徹遠聲光赫赫滿娑婆船子無地無錐徹骨窮空船赤手展家風中流兩岸頻移棹苦海千波任轉蓬透網金鱗才滯水瀑腮電火急飛紅入泥入水華亭老師表江南獨讓雄次宋學士靈峰留題韻呈本師和尚幽棲高託入雲天四海禪流走萬千釣入滄波忘際岸身藏北斗絶中邊孤芳嫩桂開仙苑獨秀靈苗長石田最喜祖庭重展拓千斤法擔有人肩臘月三鼓出坡口占雞鳴出遠披信步轉山阿鶴髮霜華染鶉衣風箭過曲澗水生骨長空月渡河半生行腳事古鏡不須磨山居幽鳥林間奏管絃香風澗水盡談禪客來動問山中趣笑指喬松有鶴眠折腳鐺煨瓔珞粥空心銚煮淡黃齏現成受用無多子贏得疏慵倚杖藜荷上露珠輕盈本自瑤階下妙轉風前不露蹤千手大悲難捉摸翻身又入水晶宮破草鞋萬壑千峰曾踏斷通身骨露更忘疲而今投老嵒隈下臥月眠雲是所宜臘月送亡僧值雨濛濛四野凍雲垂火送亡僧冒雨回莫謂去人消息斷短牆新放一枝梅朔風欲剪素毛新吹落梅華不染塵古徑瀟瀟松底雨一般清冷泣同人辭世偈五十二年如一寢就裏全機無別共真人無位無生滅梅梢月上清風動臨行句子少人知八面玲瓏無罅縫咄哉四海衆高流莫弄虛頭休打鬨若是無依過量人出生入死能珍重有權有實有照有用八角車輪空裏轉焦磚打著連底凍佛事挂過堂版風骨嚴冷體性剛堅規模法席號令人天有準有則無倚無偏動則轟轟烈烈靜時密密綿綿玉應金舂香積內雲奔水赴雁堂前正當恁麼時如何擊一下云輕輕擊著如雷垢好聽希聲徹大千六和火光焰焰淨贏贏和上人還會麼直教火裏現全身充塞乾坤絶包裹澄源火數載叢林木作一旦桶箍爆卻驀然徹底無依直下灑灑落落火光燎著面門時無位真人光爍爍慧目火大悲千眼非多臨濟一隻非獨果汝慧目圜明照破生死起伏其或未然直下為汝點開徹證本來面目淨虛化主火者箇師僧逆行順化行平等慈毫無虛詐臨行一段光明洞徹天上天下咦腳跟不動到家鄉常寂光中天不夜體用火體即用用即體任用縱橫自家底放去收來珠走盤坦然無礙超生死還委悉麼觸處洞然無間隔耀古騰今活潑潑空如火空如來藏碎祖師關超宗越格一剎那間雲崖火孤雲自在出沒崖巔放開彌布遍覆三千火雲斂處髑髏乾情與無情等煥然明通火生死牢關如打徹祖師玄旨便明通臨行一句重相為火入火兮空合空體圜火無缺無餘絶正偏當人本體自周圜死生洞徹渾無礙劫外今時沒變遷才擬議隔天淵更入紅爐重鍛過精金火後轉光鮮周遍火廓徹無依悉周遍無邊剎海不隔線十方世界現全身坐斷古今無背面薦不薦掣電神機光焰焰蒼石火當陽直指莫疑猜火把頭邊正眼開生死涅槃俱覷破石人撫掌舞三臺果生火有情因地果還生須悟當生生不生直下分明親見徹菩提妙果本圜成涵宇禪人火佛轉法輪火焰裏雷轟電掣談玄旨有時焰裏結寒冰有時千華開碓觜禪人若悟目前機與佛同生同住止烈焰光中歸去來騰騰腳底清風起三一上座火一即三三即一放開捏聚最綿密平生胸次若冰霜處衆謙光還朴質世緣六十又三年撒手便行能事畢且道如何是末後一句優曇華向火中開透骨馨香是今日曉峰禪人火白晝雷轟電閃爍鐵牛掣斷黃金索驀然躍出海門東八臂那吒難捉摸曉禪人能闊綽烈焰光中信腳行清風無限生頭角預知時至吉祥面逝道山火出保社入叢林親師擇友一片苦心未明三八九不免自沈吟今日皮膚俱脫落通身剛骨盡黃金更有轉身一句子直截當陽為君指勝爇門中掉臂行毗盧頂上清風起冬日為照如火一道神光有照有用以此輔弼叢林以此赤心為衆會得生死一如不會開眼作夢與君覿面提持大似一陽解凍攛火苣云可中瞥地解翻身烈焰爐中飛彩鳳淨修禪人起龕惟爾淨修積功纍德發廣大心為衆竭力衝暑冒寒精勤不息今朝攃手便行指爾超生佛國腳下無私路路通十方俱遍絶行蹤騰身高步毗盧頂踏倒須彌與別峰尊嚴比丘尼火生也全機見死也全機見生死不相干獨露本來面本非男女相何妨能轉變石女天明戴帽歸撞破虛空七八片無端驚起富羅山逡巡走入空王殿莫他求須自薦更有末後句為伊通一線烈焰光中綻白蓮大千剎海都開遍戒微充公起龕叫不應山無陰陽地不露頭角全彰意氣時節到來爪牙俱利以杖擊龕云杖頭擊著便翻身師子奮迅恣遊戲鍛骨生緣八閩往來兩浙德望既充衆咸喜說出入叢林人呼俊傑眉底能舒白玉毫眼中不著黃金屑四十餘年一夢中泥牛走入金毛穴今朝徹底為掀翻窠臼不存好時節末後句為君訣斬新更入洪爐鍛洪爐焰裏寒冰結劫火光中得自繇一片清涼除惱熱淺葬數年今煆過入普同塔衆靈骨起龕四海衆高流大家在者裏示寂有先後歸源無此彼鐵牛不臥巟陂真龍豈藏死水密移一步透重關西方入定東方起鍛骨死骷髏活龍象逐隊成群東拋西放多年雨打風吹幾度雲封雪葬未能法合古規豈得通身快暢今朝獨露風前指爾單明向上還會麼瞥轉一機急著眼看一齊煆送人紅爐透出白毫光燦爛妙手僧繇畫不成充塞虛空無際岸普同入塔白銀世界金色身情與無情共一真法源平等何高下總是靈山一會人忘彼我絶疏親箇箇全身無向背人人眼出透金塵今日同歸無縫塔正體堂堂沒卻身諸仁者既是正體堂堂為甚麼沒卻身不見道天曉不露夜半正明斷塵米頭起龕無榮無辱過生平寢入南柯眼未明遂喝一喝云霹靂一聲昏夢破坦然高步涅槃城舉火斷除塵垢尚落偏枯要得圜妙絶後再蘇華開碓觜笑殺老盧眼中無屑肘後有符火裏翻身能𨁝跳皮膚脫落絶名模衆靈骨入普同十方薄伽梵三界獨稱尊諸仁如薦得一路涅槃門涅槃門絶遮互八字打開兩手分付無景對下合同船大家齊上無生路悟塵起龕以杖擊龕云悟塵若悟此三昧生死牢關百雜碎化城不住絶拘留便歸寶所無罣礙祇如腳下無私一句又作麼生道步步絶行蹤通身無向背舉火生老病死苦為人那箇無會得安閒法還他大丈夫悟禪人還會麼拈起死柴頭且向無煙火烈焰光中掉臂行赤灑灑兮淨贏贏無死無生無涅槃逼塞虛空絶包裹一明火一明不明眼裏無筋自遮自障喪卻生平為爾金針一撥通身都是眼睛送入紅爐鍛過無明業識冰清當下豁然親悟入巍巍高踞涅盤城
